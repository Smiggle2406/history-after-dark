<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorization — History After Dark Publisher</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 640px; margin: 60px auto; padding: 0 24px;
    background: #14141a; color: #eceaf0; line-height: 1.6;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .sub { color: #9a95a8; margin-top: 0; }
  .code {
    background: #1f1f29; border: 1px solid #34333f; border-radius: 8px;
    padding: 16px; font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.95rem; word-break: break-all; margin: 20px 0 12px;
  }
  button {
    background: #d94a5a; color: #fff; border: 0; border-radius: 6px;
    padding: 10px 18px; font-size: 0.95rem; cursor: pointer;
  }
  button:hover { background: #c33f4e; }
  .err { color: #ff8b8b; }
  .note { color: #9a95a8; font-size: 0.9rem; margin-top: 28px; }
</style>
</head>
<body>
<h1>Authorization callback</h1>
<p class="sub">Copy the code below and paste it into the terminal.</p>

<div id="out" class="code">Reading…</div>
<button id="copy" style="display:none">Copy code</button>

<p class="note">
  This page runs entirely in your browser. The code is never sent
  anywhere — it is only displayed so you can paste it into the tool
  running on your own machine. It expires within minutes and can be used
  only once.
</p>

<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get("code");
  var error = params.get("error_description") || params.get("error");
  var out = document.getElementById("out");
  var btn = document.getElementById("copy");

  if (code) {
    out.textContent = code;
    btn.style.display = "inline-block";
    btn.onclick = function () {
      navigator.clipboard.writeText(code).then(function () {
        btn.textContent = "Copied";
        setTimeout(function () { btn.textContent = "Copy code"; }, 1500);
      });
    };
  } else if (error) {
    out.className = "code err";
    out.textContent = "Authorization failed: " + error;
  } else {
    out.textContent = "No code in this URL. Start the flow from the tool.";
  }
</script>
</body>
</html>
